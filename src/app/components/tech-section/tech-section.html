<section class="section-shell compact-section" id="tools">
  <app-section-heading
    eyebrow="Tech stack"
    title="Tools and platforms"
    description="Technologies used across backend systems, data workflows, APIs, and internal tools."
  />

  <div class="chip-cloud reveal" aria-label="Technology stack">
    @for (item of techStack; track item.label) {
      <span class="tech-chip">
        @if (item.logo) {
          <img class="tech-logo" [src]="item.logo" [alt]="item.label + ' logo'" loading="lazy" />
        }
        <span class="tech-label">{{ item.label }}</span>
      </span>
    }
  </div>
</section>
