<section class="section-shell" id="expertise">
  <app-section-heading
    eyebrow="Core expertise"
    title="Backend depth with enterprise delivery context"
    description="A practical mix of backend engineering, database systems, integrations, production support, and business-focused system analysis."
  />

  <div class="card-grid expertise-grid">
    @for (item of expertise; track item.title) {
      <article class="info-card expertise-card reveal">
        <div
          class="expertise-icon"
          [class]="'expertise-icon expertise-icon-' + item.icon"
          aria-hidden="true"
        >
          @switch (item.icon) {
            @case ('server') {
              <svg viewBox="0 0 48 48" focusable="false">
                <path d="M11 12h26v9H11zM11 27h26v9H11z" />
                <path d="M17 16h10M17 31h10" />
                <circle cx="33" cy="16.5" r="1.8" />
                <circle cx="33" cy="31.5" r="1.8" />
              </svg>
            }
            @case ('database') {
              <svg viewBox="0 0 48 48" focusable="false">
                <ellipse cx="24" cy="13" rx="14" ry="6" />
                <path d="M10 13v18c0 3.3 6.3 6 14 6s14-2.7 14-6V13" />
                <path d="M10 22c0 3.3 6.3 6 14 6s14-2.7 14-6" />
              </svg>
            }
            @case ('integration') {
              <svg viewBox="0 0 48 48" focusable="false">
                <path d="M14 24h20M24 14v20" />
                <rect x="7" y="17" width="10" height="14" rx="3" />
                <rect x="31" y="17" width="10" height="14" rx="3" />
                <rect x="17" y="7" width="14" height="10" rx="3" />
                <rect x="17" y="31" width="14" height="10" rx="3" />
              </svg>
            }
            @case ('reliability') {
              <svg viewBox="0 0 48 48" focusable="false">
                <path d="M24 8l14 6v10c0 8-5.6 13.8-14 16-8.4-2.2-14-8-14-16V14z" />
                <path d="M16 25h5l3-7 4 13 3-6h5" />
              </svg>
            }
            @case ('frontend') {
              <svg viewBox="0 0 48 48" focusable="false">
                <rect x="9" y="10" width="30" height="24" rx="4" />
                <path d="M15 18h10M15 25h18M20 39h8" />
              </svg>
            }
            @default {
              <svg viewBox="0 0 48 48" focusable="false">
                <path d="M14 14h20v20H14z" />
                <path d="M10 24h8M30 24h8M24 10v8M24 30v8" />
              </svg>
            }
          }
        </div>
        <h3>{{ item.title }}</h3>
        <p>{{ item.description }}</p>
      </article>
    }
  </div>
</section>
